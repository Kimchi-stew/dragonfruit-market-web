server {
    listen 80;
    server_name alvin1105.cloud www.alvin1105.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name alvin1105.cloud www.alvin1105.cloud;

    ssl_certificate /etc/letsencrypt/live/alvin1105.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alvin1105.cloud/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}